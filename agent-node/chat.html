<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mesa de Servicios - Parques Nacionales</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1e1e32; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.header { background: #1457e1; padding: 12px 16px; }
.header h1 { font-size: 15px; font-weight: 700; }
.header p { font-size: 11px; color: #c8d8ff; margin-top: 2px; }
.messages { flex: 1; overflow-y: auto; padding: 12px; }
.msg { margin-bottom: 10px; max-width: 85%; }
.msg.soporte { margin-right: auto; }
.msg.usuario { margin-left: auto; }
.msg .bubble { padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.4; }
.msg.soporte .bubble { background: #2a2a45; }
.msg.usuario .bubble { background: #1457e1; }
.msg .time { font-size: 10px; color: #666; margin-top: 3px; padding: 0 4px; }
.msg.usuario .time { text-align: right; }
.input-area { padding: 10px; border-top: 1px solid #333; display: flex; gap: 8px; }
.input-area input { flex: 1; background: #2a2a45; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; }
.input-area input:focus { border-color: #1457e1; }
.input-area button { background: #1457e1; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.input-area button:hover { background: #1040c0; }
</style>
</head>
<body>
<div class="header">
  <h1>Mesa de Servicios</h1>
  <p>Parques Nacionales Naturales de Colombia</p>
</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <input type="text" id="input" placeholder="Escribe un mensaje..." autofocus>
  <button onclick="send()">Enviar</button>
</div>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');

function addMsg(sender, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  const time = new Date().toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = '<div class="bubble">' + text.replace(/</g,'&lt;') + '</div><div class="time">' + (sender==='soporte'?'Soporte':'Usted') + ' ' + time + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

addMsg('soporte', 'Bienvenido a la Mesa de Servicios de Parques Nacionales Naturales de Colombia. Estamos asistiendo su equipo.');

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg('usuario', text);
  input.value = '';
  fetch('/send', { method: 'POST', body: text }).catch(() => {});
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

async function pollMessages() {
  try {
    const res = await fetch('/messages');
    const data = await res.json();
    if (data.messages) {
      data.messages.forEach(m => {
        if (m === '__CLOSE__') {
          addMsg('soporte', 'La sesion de soporte ha finalizado. Gracias.');
          setTimeout(() => window.close(), 3000);
          return;
        }
        addMsg('soporte', m);
      });
    }
  } catch {}
  setTimeout(pollMessages, 500);
}
pollMessages();
</script>
</body>
</html>
