services:
  # ============================================
  # Base de Datos PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: manobi-postgres
    restart: always
    environment:
      POSTGRES_DB: manobi_rd
      POSTGRES_USER: manobi_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ManobiRD2024!Secure}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - manobi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manobi_admin -d manobi_rd"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Sesiones y Colas
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: manobi-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-ManobiRedis2024!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - manobi-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ManobiRedis2024!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend - NestJS API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manobi-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://manobi_admin:${DB_PASSWORD:-ManobiRD2024!Secure}@postgres:5432/manobi_rd
      REDIS_URL: redis://:${REDIS_PASSWORD:-ManobiRedis2024!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-ManobiJWT2024!SuperSecretKey!ChangeMe}
      JWT_EXPIRATION: 8h
      CORS_ORIGIN: http://localhost:3000
      TURN_SERVER: ${TURN_SERVER:-turn:localhost:3478}
      TURN_USERNAME: ${TURN_USERNAME:-manobi}
      TURN_PASSWORD: ${TURN_PASSWORD:-ManobiTurn2024!}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - manobi-network
    volumes:
      - upload_data:/app/uploads

  # ============================================
  # Frontend - Next.js
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manobi-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_TURN_SERVER: ${TURN_SERVER:-turn:localhost:3478}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - manobi-network

  # ============================================
  # Coturn - Servidor TURN/STUN para WebRTC
  # ============================================
  coturn:
    image: coturn/coturn:latest
    container_name: manobi-coturn
    restart: always
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/turnserver.conf
    command: ["-c", "/etc/turnserver.conf"]
    networks:
      - manobi-network

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: manobi-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend
    networks:
      - manobi-network

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  manobi-network:
    driver: bridge
