# Manobi-RD - Configuración Coturn
# Servidor TURN/STUN para WebRTC

# Puerto de escucha
listening-port=3478
tls-listening-port=5349

# Rango de puertos para relay
min-port=49152
max-port=49200

# Autenticación
lt-cred-mech
user=manobi:ManobiTurn2024!

# Realm
realm=manobi-rd.local

# Logs
log-file=/var/log/turnserver.log
verbose

# Seguridad
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Fingerprint
fingerprint
